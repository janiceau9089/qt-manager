<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QT Manager · Quốc Thiên</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="color-scheme" content="light">
<style>
/* ===== SUNSET (default) ===== */
:root{
  --bg:#fff4ec;--surface:#ffffff;--text:#40233b;--muted:#b78a93;--faint:#e0bfc4;
  --border:#ffe0d2;--brand:#ff6f61;--brand2:#ff9e5e;--grad:linear-gradient(135deg,#ff7a9c 0%,#ff7a5c 55%,#ffb04a 100%);
  --soft:#ffe7df;--chip:#fff0e8;--glosstop:rgba(255,255,255,.72);--shadow:0 8px 22px rgba(255,120,92,.16);--bshadow:rgba(255,111,97,.45);
  --m1:#ff7a9c;--m2:#ffc14d;--m3:#43d0bf;--m4:#7b6cf6;
  --green:#2bb673;--greenbg:#e3f7ec;--amber:#ff9500;--amberbg:#fff1de;--red:#ff4d4f;--redbg:#ffe7e7;--blue:#3aa0ff;--bluebg:#e6f1ff;--indigo:#7b6cf6;--indigobg:#eeebff;
}
/* ===== BABY BLUE ===== */
body.baby{
  --bg:#eaf5ff;--surface:#ffffff;--text:#173a5e;--muted:#7ba6cc;--faint:#c3ddf3;
  --border:#d9ecfc;--brand:#3aa0ff;--brand2:#8fd3ff;--grad:linear-gradient(135deg,#6db8ff 0%,#4aa6ff 55%,#7ee3d6 100%);
  --soft:#e3f1ff;--chip:#eef7ff;--glosstop:rgba(255,255,255,.78);--shadow:0 8px 22px rgba(58,160,255,.16);--bshadow:rgba(58,160,255,.45);
  --m1:#4aa6ff;--m2:#7ee3d6;--m3:#ffd36e;--m4:#ff8fb1;
}
/* ===== DARK (chung) ===== */
body.dark{
  --bg:#0e1116;--surface:#191e26;--text:#f3f5f8;--muted:#8b95a3;
  --border:#2a313c;--brand:#ff9e7d;--brand2:#ffd36e;--grad:linear-gradient(135deg,#ff7a9c,#ff9e5e,#ffd36e);--faint:#5b6470;
  --soft:rgba(255,158,125,.16);--chip:#232a34;--glosstop:rgba(255,255,255,.05);--shadow:0 10px 26px rgba(0,0,0,.5);--bshadow:rgba(0,0,0,.45);
  --green:#36d399;--greenbg:rgba(54,211,153,.18);--amber:#ffb84d;--amberbg:rgba(255,184,77,.18);--red:#ff6b6b;--redbg:rgba(255,107,107,.2);--blue:#5bb0ff;--bluebg:rgba(91,176,255,.2);--indigo:#9d8cff;--indigobg:rgba(157,140,255,.2);
}
body.baby.dark{--brand:#7ec8ff;--brand2:#7ee3d6;--grad:linear-gradient(135deg,#6db8ff,#4aa6ff,#7ee3d6);--bshadow:rgba(0,0,0,.45);}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Be Vietnam Pro',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;transition:background .3s}
button{font-family:inherit;cursor:pointer;color:inherit}
.hidden{display:none!important}
.i{font-size:20px;line-height:1}
.ti{display:inline-flex;align-items:center;justify-content:center}
.ti svg{width:1em;height:1em;display:block;flex-shrink:0}
.phone{max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:clip}

/* glossy surfaces */
.glass{background:linear-gradient(180deg,var(--glosstop),var(--surface));box-shadow:var(--shadow)}

/* LOGIN */
#login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;position:relative;overflow:hidden}
.sh{position:absolute;pointer-events:none;opacity:.9}
.sh.dot{border-radius:50%}
.sh.ring{border-radius:50%;background:transparent}
.sh.sq{border-radius:7px}
.sh.tri{width:0;height:0;background:transparent!important}
.zig{position:absolute;opacity:.85}
.llogo{width:72px;height:72px;border-radius:22px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;margin:0 auto 16px;position:relative;overflow:hidden;box-shadow:0 12px 28px var(--bshadow);z-index:2}
.llogo::before{content:"";position:absolute;inset:0 0 50% 0;background:linear-gradient(180deg,rgba(255,255,255,.45),transparent)}
#login h1{text-align:center;font-size:27px;font-weight:800;z-index:2}
#login .s{text-align:center;color:var(--muted);font-size:14px;margin-top:4px;z-index:2}
.themepick{display:flex;gap:8px;justify-content:center;margin:18px 0 4px;z-index:2;position:relative}
.tp{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:30px;border:2px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--muted)}
.tp .sw{width:18px;height:18px;border-radius:50%}
.tp.on{border-color:var(--brand);color:var(--text)}
.roles{margin-top:18px;display:flex;flex-direction:column;gap:12px;z-index:2;position:relative}
.rcard{display:flex;align-items:center;gap:14px;border:1px solid var(--border);border-radius:18px;padding:15px;text-align:left;width:100%;position:relative;overflow:hidden;background:linear-gradient(180deg,var(--glosstop),var(--surface));box-shadow:var(--shadow)}
.rcard:active{transform:scale(.99)}
.rcard .ic{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 6px 14px rgba(0,0,0,.12)}
.rcard .ic::before{content:"";position:absolute;inset:0 0 50% 0;background:linear-gradient(180deg,rgba(255,255,255,.4),transparent)}
.rcard .nm{font-weight:700;font-size:16px}
.rcard .d{color:var(--muted);font-size:13px;margin-top:2px}
.lnote{text-align:center;color:var(--faint);font-size:12px;margin-top:22px;line-height:1.5;z-index:2;position:relative}
.avatars{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px;z-index:2;position:relative}
.av{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;aspect-ratio:1;border:1px solid var(--border);border-radius:22px;padding:12px;background:linear-gradient(180deg,var(--glosstop),var(--surface));box-shadow:var(--shadow)}
.av:active{transform:scale(.98)}
.av .circle{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:800;box-shadow:0 8px 20px var(--bshadow);overflow:hidden;background-size:cover;background-position:center;position:relative}
.av .circle::before{content:"";position:absolute;inset:0 0 55% 0;background:linear-gradient(180deg,rgba(255,255,255,.4),transparent)}
.av .nm{font-weight:700;font-size:15px;color:var(--text)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;padding:14px 16px 10px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(14px)}
.hdr .ttl{font-size:23px;font-weight:800;flex:1}
.hbtn{position:relative;width:38px;height:38px;border:none;background:linear-gradient(180deg,var(--glosstop),var(--surface));border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--brand);font-size:18px;box-shadow:var(--shadow)}
.hbtn .bdg{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.hsub{padding:0 18px 6px;color:var(--muted);font-size:13px}
.screen{padding:6px 16px 100px}

/* generic */
.group{border-radius:18px;overflow:hidden;margin-bottom:16px;background:linear-gradient(180deg,var(--glosstop),var(--surface));box-shadow:var(--shadow)}
.gtitle{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:18px 6px 8px}
.item{display:flex;align-items:center;gap:12px;padding:14px 15px;width:100%;text-align:left;background:transparent;position:relative;border:none;font-family:inherit;color:inherit}
.item:not(:last-child)::after{content:"";position:absolute;left:48px;right:14px;bottom:0;height:1px;background:var(--border);opacity:.7}
.item:active{background:var(--chip)}
.item:first-child{border-top-left-radius:18px;border-top-right-radius:18px}
.item:last-child{border-bottom-left-radius:18px;border-bottom-right-radius:18px}
.item .bar{width:6px;align-self:stretch;border-radius:6px;flex-shrink:0;min-height:34px}
.tbadge{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative;overflow:hidden;color:#fff;box-shadow:0 4px 10px rgba(0,0,0,.14)}
.tbadge::before{content:"";position:absolute;inset:0 0 50% 0;background:linear-gradient(180deg,rgba(255,255,255,.38),transparent)}
.tbadge .ti{position:relative;z-index:1}
.tbadge.big{width:50px;height:50px;border-radius:16px;font-size:26px}
.linkrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.linkbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:linear-gradient(180deg,var(--glosstop),var(--surface));color:var(--brand);font-weight:700;font-size:13px;padding:9px 13px;border-radius:12px;box-shadow:var(--shadow)}
.linkbtn.empty{color:var(--muted);font-weight:600}
.editlink{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:11px;padding:9px 10px;font-size:15px}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--soft);color:var(--brand);font-weight:600;font-size:13px;padding:7px 12px;border-radius:30px}
.chip .ti{font-size:16px}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.chip.add{background:transparent;color:var(--muted);border-style:dashed;font-weight:500}
.item .t{font-weight:700;font-size:15px}
.item .s{font-size:13px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.chev{color:var(--faint);font-size:18px;margin-left:auto;flex-shrink:0}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.pill{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--chip);color:var(--muted);font-weight:600}
.money{font-weight:800;font-size:14px;white-space:nowrap}
.empty{color:var(--faint);font-size:14px;padding:26px 0;text-align:center}

/* KPI */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:6px}
.kpi{border-radius:18px;padding:14px;position:relative;overflow:hidden;background:linear-gradient(180deg,var(--glosstop),var(--surface));box-shadow:var(--shadow)}
.kpi .ico{width:32px;height:32px;border-radius:11px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:9px;position:relative;overflow:hidden;box-shadow:0 4px 10px var(--bshadow)}
.kpi .ico::before{content:"";position:absolute;inset:0 0 50% 0;background:linear-gradient(180deg,rgba(255,255,255,.45),transparent)}
.kpi .l{font-size:12px;color:var(--muted)}
.kpi .v{font-size:18px;font-weight:800;margin-top:1px}

.alert{display:flex;gap:11px;background:var(--amberbg);border-radius:16px;padding:13px 14px;margin-bottom:6px;font-size:13px;color:var(--amber);box-shadow:var(--shadow)}
.alert .i{flex-shrink:0;font-size:20px}
.alert b{display:block;margin-bottom:3px;font-size:14px}
.alert ul{margin:0;padding-left:16px;color:var(--amber)}

/* search */
.searchbar{position:relative;margin:4px 0 14px}
.searchbar .i{position:absolute;left:13px;top:12px;color:var(--faint);font-size:18px}
.searchbar input{width:100%;height:42px;border:none;border-radius:14px;background:linear-gradient(180deg,var(--glosstop),var(--surface));color:var(--text);padding:0 12px 0 40px;font-size:15px;font-family:inherit;box-shadow:var(--shadow)}
.fab{position:fixed;bottom:92px;left:50%;transform:translateX(calc(240px - 80px));z-index:25;height:52px;border:none;border-radius:26px;background:var(--grad);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;padding:0 22px;box-shadow:0 10px 26px var(--bshadow);overflow:hidden}
.fab::before{content:"";position:absolute;inset:0 0 50% 0;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent)}
@media(max-width:520px){.fab{right:18px;left:auto;transform:none}}

/* segmented */
.seg{display:flex;background:var(--chip);border-radius:14px;padding:4px;margin-bottom:14px;box-shadow:inset 0 1px 3px rgba(0,0,0,.06);position:sticky;top:54px;z-index:20}
.seg::before{content:"";position:absolute;left:-16px;right:-16px;top:-10px;bottom:-9px;background:var(--bg);z-index:-1}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:14px;padding:9px;border-radius:11px}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:0 2px 6px rgba(0,0,0,.12)}

/* iOS-like Calendar */
.calhead{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px}
.calhead .mo{font-size:22px;font-weight:800;text-transform:capitalize}
.calhead .navs{display:flex;gap:8px}
.calhead .navs button{width:36px;height:36px;border:none;border-radius:50%;background:linear-gradient(180deg,var(--glosstop),var(--surface));color:var(--brand);font-size:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
.dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow span{text-align:center;font-size:12px;font-weight:700;color:var(--muted);padding:4px 0}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:2px}
.cday{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;border:none;background:transparent;position:relative}
.cday .n{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:16px;font-weight:600}
.cday.dim .n{color:var(--faint)}
.cday.today .n{color:var(--red);font-weight:800}
.cday.today:not(.sel) .n{box-shadow:inset 0 0 0 2px var(--red)}
.calhead .navs button.todaybtn{width:auto;height:36px;border-radius:30px;background:var(--soft);color:var(--brand);font-weight:700;font-size:13px;padding:0 14px;white-space:nowrap}
.cday.sel .n{background:var(--grad);color:#fff;font-weight:800;box-shadow:0 4px 12px var(--bshadow)}
.cdots{display:flex;gap:3px;margin-top:3px;height:6px}
.cdots i{width:6px;height:6px;border-radius:50%}
.calcard{background:var(--surface);border-radius:20px;box-shadow:var(--shadow);padding:14px 14px 10px;margin:0 0 16px;position:sticky;top:54px;z-index:18}
.calcard::before{content:"";position:absolute;left:-16px;right:-16px;top:-12px;height:14px;background:var(--bg);z-index:-1}
.calcard .calhead{margin:0 2px 10px}
.dlist .dhead{font-size:15px;font-weight:800;margin:0 2px 8px;text-transform:capitalize}

/* tasks */
.task{display:flex;align-items:flex-start;gap:12px;padding:15px;background:transparent;width:100%;text-align:left;position:relative}
.task:not(:last-child)::after{content:"";position:absolute;left:53px;right:15px;bottom:0;height:1px;background:var(--border);opacity:.7}
.tcheck{width:28px;height:28px;border-radius:50%;border:2px solid var(--faint);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.tcheck.done{background:var(--grad);border-color:transparent;box-shadow:0 3px 8px var(--bshadow)}
.tcheck.doing{border-color:var(--blue);color:var(--blue)}
.tcheck.doing .i{font-size:13px}
.task .tn{font-weight:700;font-size:15px}
.task.isdone .tn{color:var(--faint);text-decoration:line-through}
.task .nt{font-size:13px;color:var(--muted);margin-top:3px}
.task .meta{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
.stpill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:none}

/* detail */
.back{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(180deg,var(--glosstop),var(--surface));border:1.5px solid var(--brand);color:var(--brand);font-size:15px;font-weight:700;padding:9px 16px 9px 11px;border-radius:30px;margin-bottom:14px;box-shadow:var(--shadow)}
.back:active{transform:scale(.97)}
.dtitle{font-size:22px;font-weight:800;margin:2px 0 8px}
.bigbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;border:none;border-radius:16px;background:var(--grad);color:#fff;font-weight:700;font-size:16px;margin:6px 0 16px;position:relative;overflow:hidden;box-shadow:0 10px 24px var(--bshadow)}
.bigbtn::before{content:"";position:absolute;inset:0 0 50% 0;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent)}
.bigbtn.alt{background:linear-gradient(180deg,var(--glosstop),var(--surface));color:var(--brand);box-shadow:var(--shadow)}
.bigbtn.alt::before{display:none}
.drow{display:flex;gap:13px;padding:14px 15px;align-items:flex-start;position:relative}
.drow:not(:last-child)::after{content:"";position:absolute;left:64px;right:15px;bottom:0;height:1px;background:var(--border);opacity:.7}
.drow .di{width:36px;height:36px;border-radius:12px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--brand);font-size:18px;flex-shrink:0}
.drow .dk{font-size:12px;color:var(--muted)}
.drow .dv{font-weight:700;font-size:15px;margin-top:1px;white-space:pre-wrap}
.pre{white-space:pre-wrap;font-size:14px;line-height:1.6;padding:14px 15px;color:var(--text)}
.tabs{display:flex;gap:4px;background:var(--chip);border-radius:14px;padding:4px;margin-bottom:14px;overflow:visible;box-shadow:inset 0 1px 3px rgba(0,0,0,.06);position:sticky;top:54px;z-index:20}
.tabs::before{content:"";position:absolute;left:-16px;right:-16px;top:-10px;bottom:-9px;background:var(--bg);z-index:-1}
.tabs button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13px;padding:8px 6px;border-radius:11px;white-space:nowrap}
.tabs button.on{background:var(--surface);color:var(--text);box-shadow:0 2px 6px rgba(0,0,0,.12)}

/* bottom tabbar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40;display:flex;background:color-mix(in srgb,var(--surface) 88%,transparent);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
.tabbar button{flex:1;border:none;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px}
.tabbar button .i{font-size:23px}
.tabbar button.on{color:var(--brand)}
.tabbar button.on .i{transform:translateY(-1px)}
.noverlay{position:fixed;inset:0;z-index:55;display:none}
.npanel{position:absolute;top:58px;right:12px;left:12px;z-index:60;border-radius:18px;background:linear-gradient(180deg,var(--glosstop),var(--surface));box-shadow:0 18px 44px rgba(0,0,0,.2);overflow:hidden;display:none;max-width:360px;margin-left:auto}
.npanel.open{display:block}
.nhead{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.nhead .t{font-weight:800;font-size:15px;flex:1}
.nhead button{width:34px;height:34px;border:none;border-radius:50%;background:var(--chip);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:17px}
.nrow{display:flex;gap:10px;padding:12px 14px;align-items:flex-start;width:100%;text-align:left;background:transparent;border:none;position:relative;color:inherit;font-family:inherit}
.nrow:active{background:var(--chip)}
.nrow:not(:last-child)::after{content:"";position:absolute;left:34px;right:14px;bottom:0;height:1px;background:var(--border);opacity:.6}
.nrow .ndot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.nrow.read{opacity:.5}
.nrow.read .ndot{background:transparent!important;border:1.5px solid var(--faint)}
.ntext{font-size:14px;font-weight:500;line-height:1.4}
.nempty{padding:26px;text-align:center;color:var(--faint);font-size:14px}
.grp{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;padding:16px 6px 8px;font-weight:700;font-size:15px;color:var(--text);text-align:left}
.grp .ti{font-size:18px;color:var(--muted)}
.grp .gcount{margin-left:auto;background:var(--chip);color:var(--muted);font-size:12px;font-weight:600;border-radius:20px;padding:2px 10px}
.grp-year{font-size:17px;border-top:1px solid var(--border);margin-top:6px}
.grp-year .gcount{background:var(--soft);color:var(--brand)}
.pastlabel{font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin:22px 6px 2px;border-top:1px solid var(--border);padding-top:14px}
.pastwrap{opacity:.6}

/* ===== FORM TẠO SỰ KIỆN ===== */

function renderNotif(){
 var unread=notifs.filter(function(n){return !n.read;}).length;
 var bdg=document.getElementById('bellBdg');
 if(unread>0){bdg.style.display='flex';bdg.textContent=unread;}else{bdg.style.display='none';}
 var p=document.getElementById('npanel');
 var rows=notifs.length?notifs.map(function(n){var col=n.sev=='red'?'var(--red)':'var(--amber)';return '<button class="nrow'+(n.read?' read':'')+'" data-nread="'+n.id+'"><span class="ndot" style="background:'+col+'"></span><span class="ntext">'+n.text+'</span></button>';}).join(''):'<div class="nempty">Không có thông báo nào 🎉</div>';
 p.innerHTML='<div class="nhead"><span class="t">Thông báo</span><button id="nmark" title="Đánh dấu tất cả đã đọc"><i class="ti ti-checks"></i></button><button id="nclear" title="Xóa hết"><i class="ti ti-trash"></i></button></div>'+rows;

 var c=document.getElementById('nclear');if(c)c.onclick=function(e){e.stopPropagation();notifs=[];renderNotif();};
 p.querySelectorAll('[data-nread]').forEach(function(el){el.onclick=function(){var n=notifs.filter(function(x){return x.id==+el.dataset.nread;})[0];if(n)n.read=true;renderNotif();};});

function pad(n){return n<10?'0'+n:''+n;}
function icsDate(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';}
function _icsEsc(s){return String(s||'').replace(/\\/g,'\\\\').replace(/\r?\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');}
function _mkDT(dateStr,timeStr,base){var d;if(dateStr){d=new Date(dateStr+'T'+(timeStr||'09:00')+':00');}else{d=new Date(base);if(timeStr){var p=String(timeStr).split(':');d.setHours(+p[0]||0,+p[1]||0,0,0);}}return d;}
function _vev(uid,start,end,summary,location,desc){return 'BEGIN:VEVENT\r\nUID:'+uid+'@qtmanager\r\nSEQUENCE:'+Math.floor(Date.now()/1000)+'\r\nDTSTAMP:'+icsDate(new Date())+'\r\nDTSTART:'+icsDate(start)+'\r\nDTEND:'+icsDate(end)+'\r\nSUMMARY:'+_icsEsc(summary)+'\r\nLOCATION:'+_icsEsc(location)+'\r\nDESCRIPTION:'+_icsEsc(desc)+'\r\nBEGIN:VALARM\r\nTRIGGER:-PT2H\r\nACTION:DISPLAY\r\nDESCRIPTION:Nhắc lịch\r\nEND:VALARM\r\nEND:VEVENT\r\n';}
function addToCal(id){var j=jById[id];var evs=[];var loc=[j.loc,j.prov].filter(Boolean).join(', ');
 // sự kiện chính + chi tiết trong ghi chú
 var L=[];
 if(j.call)L.push('Call time: '+dt(j.call));
 if(j.client||j.contact||j.phone)L.push('Khách/Liên hệ: '+[j.client,j.contact,j.phone].filter(Boolean).join(' · '));
 if(j.band&&j.band.on&&j.band.name)L.push('Band: '+j.band.name+(j.band.phone?(' - '+j.band.phone):''));
 if(j.beat&&j.beat.on){if(j.beat.songs)L.push('Setlist: '+j.beat.songs);if(j.beat.link)L.push('Beat: '+j.beat.link);}
 if(j.dancer&&j.dancer.on&&j.dancer.name)L.push('Dancer: '+j.dancer.name+(j.dancer.count?(' ('+j.dancer.count+' người)'):'')+(j.dancer.phone?(' - '+j.dancer.phone):'')+(j.dancer.time?(' '+j.dancer.time):''));
 if(j.photo&&j.photo.on&&j.photo.name)L.push('Photo: '+j.photo.name+(j.photo.phone?(' - '+j.photo.phone):'')+(j.photo.time?(' '+j.photo.time):''));
 if(j.social&&j.social.on&&j.social.name)L.push('Social: '+j.social.name+(j.social.phone?(' - '+j.social.phone):'')+(j.social.time?(' '+j.social.time):''));
 if(j.move&&j.move.on&&j.move.car&&j.move.car.on){var c=j.move.car;L.push('Xe: '+(c.name||'')+(c.phone?(' - '+c.phone):'')+(c.time?(' đón '+c.time):'')+(c.pickup?(' tại '+c.pickup):'')+(c.note?(' ['+c.note+']'):''));}
 if(j.stay&&j.stay.on&&j.stay.hotel)L.push('Khách sạn: '+j.stay.hotel+(j.stay.room?(' - phòng '+j.stay.room):'')+((j.stay.checkin||j.stay.checkout)?(' (in '+(j.stay.checkin||'?')+' / out '+(j.stay.checkout||'?')+')'):'')+(j.stay.phone?(' - '+j.stay.phone):''));
 if(j.note)L.push('Ghi chú: '+j.note);
 evs.push(_vev(id+':main',j.start,j.end,j.name,loc,L.join('\n')));
 // tập band (mỗi buổi)
 if(j.rehearsals&&j.rehearsals.length)j.rehearsals.forEach(function(r,i){if(!r.date)return;var s=_mkDT(r.date,r.time,j.start);evs.push(_vev(id+':reh'+i,s,_plusMin(s,120),'Tập band — '+j.name,r.location||loc,(j.band&&j.band.name?('Band: '+j.band.name+(j.band.phone?(' - '+j.band.phone):'')):'')));});
 // soundcheck
 if(j.soundcheck&&j.soundcheck.on&&(j.soundcheck.date||j.soundcheck.time)){var s=_mkDT(j.soundcheck.date,j.soundcheck.time,j.start);evs.push(_vev(id+':sc',s,_plusMin(s,60),'Soundcheck — '+j.name,loc,''));}
 // makeup
 if(j.makeup&&j.makeup.on&&j.makeup.time){var s=_mkDT(null,j.makeup.time,j.start);evs.push(_vev(id+':mk',s,_plusMin(s,90),'Makeup — '+j.name,j.makeup.location||loc,(j.makeup.name||'')+(j.makeup.phone?(' - '+j.makeup.phone):'')));}
 // máy bay
 if(j.move&&j.move.on&&j.move.flight&&j.move.flight.on&&(j.move.flight.depart||j.move.flight.no)){var f=j.move.flight;var s=_mkDT(null,f.depart||'06:00',j.start);var e=f.arrive?_mkDT(null,f.arrive,j.start):_plusMin(s,120);if(e<=s)e=_plusMin(s,120);var fd=['Chuyến: '+(f.no||''),(f.code?('Code: '+f.code):''),(f.route?('Lộ trình: '+f.route):''),(f.ticketUrl?('Vé: '+f.ticketUrl):'')].filter(Boolean).join('\n');evs.push(_vev(id+':fl',s,e,'✈ Bay'+(f.route?(' '+f.route):'')+' — '+j.name,'',fd));}
 var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//QT Manager//VI\r\nCALSCALE:GREGORIAN\r\n'+evs.join('')+'END:VCALENDAR';
 var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});var url=URL.createObjectURL(blob);
 var a=document.createElement('a');a.href=url;a.download=j.name.replace(/[^\wÀ-ỹ -]/g,'')+'.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);
 setTimeout(function(){URL.revokeObjectURL(url);},1500);
 if(window.toast)toast('Đã xuất '+evs.length+' mục lịch');
}
function _plusMin(d,m){return new Date(d.getTime()+m*60000);}

function render(){

 document.getElementById('hTitle').textContent=TITLES[base]||'QT';
 var sc=document.getElementById('screen');var s=state.screen;
 if(s.indexOf('job:')==0)sc.innerHTML=screenDetail(s.slice(4));
 else if(s=='dash')sc.innerHTML=screenDash();
 else if(s=='jobs')sc.innerHTML=screenJobs();
 else if(s=='calendar')sc.innerHTML=screenCal();
 else if(s=='money')sc.innerHTML=screenMoney();
 else if(s=='tasks')sc.innerHTML=screenTasks();
 else if(s=='documents')sc.innerHTML=screenDocs();
 else if(s=='artist')sc.innerHTML=screenArtist();

 else if(s=='create')sc.innerHTML=screenCreate();

 renderTabs();bind();applyIcons();

// Gom theo tháng: sắp tới ở trên (tăng dần), đã qua dồn xuống dưới + làm mờ
// + đảo ngược (tháng gần nhất trước), năm cũ là nhóm bấm mở ra mới hiện tháng.
function buildGrouped(list, itemFn){
 if(!list.length) return '<div class="empty">Không có lịch</div>';
 var sorted=list.slice().sort(function(a,b){return a.start-b.start});
 var curY=now.getFullYear();
 var todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
 function monthsOf(items){var map={},order=[];items.forEach(function(j){var y=j.start.getFullYear(),m=j.start.getMonth();var k=y+'_'+m;if(!map[k]){map[k]={y:y,m:m,items:[]};order.push(k);}map[k].items.push(j);});return order.map(function(k){return map[k];});}
 var active=monthsOf(sorted.filter(function(j){return j.start>=todayStart;}));         // từ hôm nay trở đi
 var past=monthsOf(sorted.filter(function(j){return j.start<todayStart;}).reverse());  // đã qua (giảm dần)

 function monthBlock(M,monthDef,indent){var mk='m'+M.y+'_'+M.m;var coll=isColl(mk,monthDef);
   var h='<button class="grp" data-coll="'+mk+'" data-def="'+(monthDef?1:0)+'"'+(indent?' style="padding-left:20px"':'')+'><i class="ti '+(coll?'ti-chevron-right':'ti-chevron-down')+'"></i><span>'+monthLabel(M.y,M.m)+'</span><span class="gcount">'+M.items.length+'</span></button>';
   if(!coll)h+='<div class="group">'+M.items.map(itemFn).join('')+'</div>';
   return h;}
 function section(ms,monthDef){var h='';var ys=[],byY={};
   ms.forEach(function(M){if(!byY[M.y]){byY[M.y]=[];ys.push(M.y);}byY[M.y].push(M);});
   ys.forEach(function(y){var arr=byY[y];
     if(y===curY){arr.forEach(function(M){h+=monthBlock(M,monthDef,false);});}
     else{var yk='y'+y;var yDef=(y<curY);var yColl=isColl(yk,yDef);var tot=arr.reduce(function(s,M){return s+M.items.length},0);
       h+='<button class="grp grp-year" data-coll="'+yk+'" data-def="'+(yDef?1:0)+'"><i class="ti '+(yColl?'ti-chevron-right':'ti-chevron-down')+'"></i><span>Năm '+y+'</span><span class="gcount">'+tot+'</span></button>';
       if(!yColl)arr.forEach(function(M){h+=monthBlock(M,monthDef,true);});}
   });
   return h;}

 var h=section(active,false);
 if(past.length)h+='<div class="pastlabel">Đã qua</div><div class="pastwrap">'+section(past,true)+'</div>';
 return h;
}

  out.push({d:j.start,end:j.end,title:j.name,type:j.type,job:j.id,kind:'main',loc:j.loc||j.prov||''});

  if(j.soundcheck&&j.soundcheck.on&&(j.soundcheck.date||j.soundcheck.time)){var s=_mkDT(j.soundcheck.date,j.soundcheck.time,j.start);out.push({d:s,end:_plusMin(s,60),title:j.name,type:j.type,job:j.id,kind:'sc',loc:j.loc||''});}

  if(j.move&&j.move.on&&j.move.flight&&j.move.flight.on&&(j.move.flight.depart||j.move.flight.no)){var s=_mkDT(null,j.move.flight.depart||'06:00',j.start);out.push({d:s,end:_plusMin(s,120),title:j.name,type:j.type,job:j.id,kind:'fl',loc:(j.move.flight.route||'')});}
 });return out;}

function bindSupplier(key,role){
 var sel=document.getElementById(key+'Vendor');if(!sel)return;
 function refresh(){
  var info=document.getElementById(key+'Info');var other=document.getElementById(key+'OtherBox');
  if(sel.value==='__other__'){other.style.display='block';info.innerHTML='<span class="warndot" title="Chưa có thông tin thanh toán"><i class="ti ti-alert-triangle"></i></span>';}
  else{var v=vById(sel.value);other.style.display='none';
   if(!v){info.innerHTML='';}
   else if(v.bankNo&&v.cccd){info.innerHTML='<span class="okdot" title="Đủ thông tin"><i class="ti ti-check"></i></span>';}
   else{info.innerHTML='<span class="warndot" title="Chưa đủ thông tin thanh toán (thiếu STK/CCCD)"><i class="ti ti-alert-triangle"></i></span>';}}
  applyIcons();
 }
 sel.onchange=refresh;refresh();
 document.getElementById(key+'Fb').onclick=function(){var v=vById(sel.value);if(v&&v.fb)openURL(v.fb);else toast('Chưa có link Facebook');};
 document.getElementById(key+'Tel').onclick=function(){var v=vById(sel.value);var p=v?v.phone:((document.getElementById(key+'OPhone')||{}).value);if(p)window.open('tel:'+p);else toast('Chưa có SĐT');};
 var sv=document.getElementById(key+'Save');if(sv)sv.onclick=function(){var nm=(document.getElementById(key+'OName').value||'').trim();if(!nm){toast('Nhập tên trước');return;}var nv={id:'v'+Date.now(),name:nm,role:role,phone:(document.getElementById(key+'OPhone').value||'').trim(),fb:'',cccd:'',bankNo:'',bankName:'',branch:'',payCompany:'',updatedAt:Date.now()};vendors.push(nv);if(window.qtSave)window.qtSave('vendors',nv.id,nv);sel.innerHTML=vendorOptsRole(role);sel.value=nv.id;refresh();toast('Đã lưu vào danh bạ (nhớ bổ sung STK/CCCD trên Sheet)');};
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return escHtml(s).replace(/"/g,'&quot;');}
function linkify(s){return escHtml(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--brand);word-break:break-all">$1</a>');}
function notesById(id){for(var i=0;i<teamNotes.length;i++)if(teamNotes[i].id===id)return teamNotes[i];return null;}
function noteCard(n){var snip=(n.body||'').split('\n').slice(0,3).join('\n');return '<button class="notecard" data-note="'+n.id+'">'+(n.locked?'<span class="lk">🔒</span>':'')+'<div class="nt">'+escHtml(n.title)+'</div><div class="nbody">'+escHtml(snip)+'</div>'+((n.tags||[]).length?('<div class="ntags">'+n.tags.map(function(t){return '<span class="ntag">#'+t+'</span>';}).join('')+'</div>'):'')+'</button>';}
function screenTeam(){
 var notes=(teamNotes||[]).slice();
 function byUpd(a,b){return (b.updatedAt||0)-(a.updatedAt||0);}
 var pinned=notes.filter(function(n){return n.pinned;}).sort(byUpd);
 var others=notes.filter(function(n){return !n.pinned;}).sort(byUpd);
 var h='<button class="bigbtn" onclick="openNote(\'new\')"><i class="ti ti-plus i"></i> Ghi chú mới</button>';
 if(pinned.length)h+='<div class="gtitle">📌 Ghim</div><div class="notegrid">'+pinned.map(noteCard).join('')+'</div>';
 h+='<div class="gtitle">Ghi chú</div>'+(others.length?('<div class="notegrid">'+others.map(noteCard).join('')+'</div>'):emp('Chưa có ghi chú'));
 return h;
}
function screenNote(id){
 var isNew=(id==='new');
 var n=isNew?{id:'new',title:'',body:'',tags:[],pinned:false,locked:false,by:USERS[state.role].nm}:notesById(id);
 var h='<button class="back" data-go="team"><i class="ti ti-chevron-left"></i> Ghi chú nhóm</button>';
 if(!n)return h+emp('Không tìm thấy ghi chú');
 var canEd=isNew||!n.locked||canLinks();
 var acts='';
 if(!isNew)acts+='<button class="chip'+(n.pinned?' on':'')+'" onclick="togglePin(\''+n.id+'\')">📌 '+(n.pinned?'Đang ghim':'Ghim')+'</button>';
 if(!isNew&&canLinks())acts+='<button class="chip'+(n.locked?' on':'')+'" onclick="toggleLock(\''+n.id+'\')">'+(n.locked?'🔒 Đang khoá':'🔓 Khoá')+'</button>';
 if(acts)h+='<div class="chiprow" style="margin-bottom:10px">'+acts+'</div>';
 if(canEd){
  h+='<div class="group"><div class="fld"><label class="flbl">Tiêu đề</label><input id="noteTitle" class="in" value="'+escAttr(n.title)+'" placeholder="VD: 🎵 Folder beat"></div>';
  h+='<div class="fld"><label class="flbl">Nội dung (dán link được)</label><textarea id="noteBody" class="in" style="min-height:160px" placeholder="Nội dung, dán link Drive/Photos…">'+escHtml(n.body)+'</textarea></div>';
  h+='<div class="fld"><label class="flbl">Tag (phẩy ngăn cách)</label><input id="noteTags" class="in" value="'+escAttr((n.tags||[]).join(', '))+'" placeholder="nhạc, media, todo…"></div></div>';
  h+='<button class="bigbtn" onclick="saveNote(\''+n.id+'\')"><i class="ti ti-check i"></i> Lưu ghi chú</button>';
 }else{
  h+='<div class="dtitle" style="font-size:20px;margin-bottom:8px">'+escHtml(n.title)+' 🔒</div>';
  h+='<div class="group"><div class="pre">'+linkify(n.body)+'</div></div>';

  h+='<button class="bigbtn alt" data-copy="'+escAttr(n.body)+'"><i class="ti ti-link i"></i> Copy nội dung</button>';
  h+='<div class="calcd" style="margin-top:8px">🔒 Đã khoá bởi quản lý — chỉ xem & copy.</div>';
 }
 h+='<div class="calcd" style="margin-top:10px">Cập nhật bởi '+(n.by||'?')+(n.updatedAt?(' · '+dd(new Date(n.updatedAt))):'')+'</div>';

function saveNote(id){
 var t=(document.getElementById('noteTitle').value||'').trim();
 var b=document.getElementById('noteBody').value||'';
 var tags=(document.getElementById('noteTags').value||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
 var isNew=(id==='new');var nid=isNew?('n'+Date.now()):id;var ex=isNew?null:notesById(id);
 var n={id:nid,title:t||'(không tiêu đề)',body:b,tags:tags,pinned:ex?ex.pinned:false,locked:ex?ex.locked:false,by:USERS[state.role].nm,updatedAt:Date.now()};
 if(ex){for(var i=0;i<teamNotes.length;i++)if(teamNotes[i].id===nid)teamNotes[i]=n;}else teamNotes.push(n);
 if(window.qtSave)window.qtSave('teamnotes',nid,n);
 state.screen='team';scrollNext=true;render();
}
function togglePin(id){var n=notesById(id);if(!n)return;n.pinned=!n.pinned;n.updatedAt=Date.now();if(window.qtSave)window.qtSave('teamnotes',id,n);render();}
function toggleLock(id){if(!canLinks())return;var n=notesById(id);if(!n)return;n.locked=!n.locked;n.updatedAt=Date.now();if(window.qtSave)window.qtSave('teamnotes',id,n);render();}
function openNote(id){state.screen='note:'+id;scrollNext=true;render();}
window.openNote=openNote;window.saveNote=saveNote;window.togglePin=togglePin;window.toggleLock=toggleLock;

function _instPaid(i){var e=document.querySelector('.iPaidSeg[data-i="'+i+'"] .on');return e?e.dataset.val==='1':false;}
function _instChip(i){
 var paid=_instPaid(i);
 var dd=qc.dueDates[i];var over=!paid&&dd&&new Date(dd)<stripT(now);
 var html='';
 if(paid)html='<span class="cstat" style="background:var(--greenbg);color:var(--green)">🟢 Hoàn tất</span>';
 else if(over)html='<span class="cstat" style="background:var(--redbg);color:var(--red)">🔴 Quá hạn</span>';

function _rebuildInst(n,resetDue){
 qc.n=n;qc.pcts=_defPcts(n);
 if(resetDue){var ds=document.getElementById('evDate').value;var base=ds?new Date(ds+'T00:00:00'):new Date(now);var pre=new Date(base);pre.setDate(pre.getDate()-7);qc.dueDates=[dIn(n===1?base:pre)];if(n>=2)qc.dueDates.push(dIn(addBizDays(base,15)));if(n>=3)qc.dueDates.push(dIn(addBizDays(base,30)));}

try{ const app=initializeApp(cfg); const auth=getAuth(app); const db=getFirestore(app);
 async function wipeAll(){ for(const name of COLLS){ const snap=await getDocs(collection(db,name)); for(let i=0;i<snap.docs.length;i+=400){ const batch=writeBatch(db); snap.docs.slice(i,i+400).forEach(function(d){batch.delete(d.ref);}); await batch.commit(); } } }
 async function seedAll(){ const colls={jobs:window.jobs,pays:window.pays,exps:window.exps,docs:window.docs,tasks:window.tasks,contracts:window.contracts,vendors:window.vendors,accounts:window.accounts,teamnotes:window.teamNotes};
   for(const name in colls){ const arr=colls[name]||[]; for(let i=0;i<arr.length;i+=400){ const batch=writeBatch(db); arr.slice(i,i+400).forEach(function(it,k){var id=(it.id!=null)?String(it.id):(name+"_"+(i+k));it.id=id;batch.set(doc(db,name,id),ser(name,it));}); await batch.commit(); } } }
 async function loadAll(){
   const metaRef=doc(db,"app_meta","seed"); let need=true;
   try{ const ms=await getDoc(metaRef); if(ms.exists() && ms.data().v===SEED_VERSION) need=false; }catch(e){}
   const jSnap=await getDocs(collection(db,"jobs"));
   if(need || jSnap.empty){ await wipeAll(); await seedAll(); try{ await setDoc(metaRef,{v:SEED_VERSION,at:new Date().toISOString()}); }catch(e){} reindex(); }
   else { const out={}; for(const name of COLLS){ const snap=await getDocs(collection(db,name)); out[name]=snap.docs.map(function(d){return hyd(name,Object.assign({id:d.id},d.data()));}); }
     window.jobs=out.jobs;window.pays=out.pays;window.exps=out.exps;window.docs=out.docs;window.tasks=out.tasks;
     if(out.contracts&&out.contracts.length)window.contracts=out.contracts;
     if(out.vendors&&out.vendors.length)window.vendors=out.vendors;
     if(out.accounts&&out.accounts.length)window.accounts=out.accounts;
     if(out.teamnotes)window.teamNotes=out.teamnotes;
     reindex(); }
   if(window.render)window.render(); console.log("QT: Firebase synced ("+(window.jobs||[]).length+" jobs, seed "+SEED_VERSION+")"); }
 function setupLive(){ try{
   onSnapshot(collection(db,"teamnotes"),function(snap){ window.teamNotes=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}); if(window.state&&window.state.screen==="team"&&window.render)window.render(); });
   onSnapshot(collection(db,"vendors"),function(snap){ if(!snap.empty)window.vendors=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}); });
 }catch(e){console.warn(e);} }
 window.qtSave=function(coll,id,obj){try{setDoc(doc(db,coll,id),ser(coll,obj),{merge:true});}catch(e){console.warn(e);}};
 signInAnonymously(auth).then(loadAll).then(setupLive).catch(function(e){console.warn("QT: Firebase auth loi, dung du lieu cuc bo.",e);});
}catch(e){console.warn("QT: Firebase init loi.",e);}
</script>
